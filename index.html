<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>甜蜜時光 Patisserie</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="system-switcher" id="admin-switcher-bar" style="display: flex;">
        <span>⚙️ 系統切換：</span>
        <button class="active" id="btn-user" onclick="switchSystem('user')">📱 顧客前台</button>
        <button id="btn-admin" onclick="switchSystem('admin')">🏪 店家後台</button>
    </div>

    <div id="user-view">
        <header>
            <div class="nav-container">
                <a class="logo">🍰 甜蜜時光</a>
                <ul class="nav-menu">
                    <li><a onclick="showPage('home-section')">關於我們</a></li>
                    <li><a onclick="showPage('order-section')">線上點餐</a></li>
                    <li><a onclick="showPage('login-section')">會員中心</a></li>
                </ul>
            </div>
        </header>

        <div class="container">
            <section id="home-section" class="page-section active">
                <h1>歡迎來到甜蜜時光</h1>
                <p>體驗極致法式手工甜點。</p>
            </section>

            <section id="order-section" class="page-section">
                <div class="menu-grid" id="menu-grid-box">
                    <div class="menu-item">
                        <div class="menu-info">
                            <h2 class="menu-title">法式盛夏芒果塔</h2>
                            <p class="menu-price">NT$ 160</p>
                            <button class="btn-add">加入購物車</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="login-section" class="page-section">
                <div class="auth-container" id="login-area">
                    <h2>會員登入</h2>
                    <div class="form-group">
                        <input type="text" id="username-input" placeholder="請輸入姓名">
                    </div>
                    <button class="btn-auth" onclick="login()">登入</button>
                </div>
                <div id="member-area" class="auth-container" style="display: none;">
                    <h2 id="user-display"></h2>
                    <button class="btn-auth" onclick="alert('載入歷史訂單中...')">查看歷史訂單</button>
                    <button class="btn-logout" onclick="logout()">登出</button>
                </div>
            </section>
        </div>
    </div>

    <div id="admin-view">
        <div class="admin-dashboard">
            <h2>店家後台接單系統</h2>
            <p>目前尚無新訂單。</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
