<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甜蜜時光 Patisserie - 完整版</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="system-switcher" id="admin-switcher-bar">
        <span>⚙️ 系統切換：</span>
        <button class="active" onclick="switchSystem('user')">📱 顧客前台</button>
        <button onclick="switchSystem('admin')">🏪 店家後台</button>
    </div>

    <div id="user-view">
        <header>
            <div class="nav-container">
                <a onclick="showPage('home-section')" class="logo">🍰 甜蜜時光</a>
                <ul class="nav-menu">
                    <li><a onclick="showPage('home-section')">關於我們</a></li>
                    <li><a onclick="showPage('order-section')">線上點餐</a></li>
                    <li><a onclick="showPage('login-section')">會員中心</a></li>
                    <li><a onclick="showPage('order-section')">🛒 購物車 (<span id="cart-count">0</span>)</a></li>
                </ul>
            </div>
        </header>

        <div class="container">
            <section id="home-section" class="page-section active">
                <h1>歡迎來到甜蜜時光</h1>
                <p>體驗極致法式手工甜點。</p>
            </section>

            <section id="order-section" class="page-section">
                <div class="order-layout">
                    <div class="menu-products-column">
                        <h2 id="menu-title-text">精選甜點菜單</h2>
                        <div class="menu-grid" id="menu-grid-box"></div>
                    </div>
                    <div class="cart-box">
                        <h3>🛒 我的購物車</h3>
                        <div id="empty-cart-msg">購物車目前是空的。</div>
                        <ul id="cart-items"></ul>
                        <div id="cart-total-box" style="display: none;">
                            <p>總金額：NT$ <span id="total-amount">0</span></p>
                            <button class="btn-checkout" onclick="checkout()">確認送出訂單</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="login-section" class="page-section">
                <div id="login-area">
                    <h3>會員登入</h3>
                    <input type="text" id="username-input" placeholder="請輸入姓名">
                    <button onclick="login()">登入</button>
                </div>
                <div id="member-area" style="display: none;">
                    <h3 id="user-display"></h3>
                    <button onclick="renderHistory()">載入歷史訂單</button>
                    <ul id="history-list"></ul>
                </div>
            </section>
        </div>
    </div>

    <div id="admin-view" style="display: none;">
        <div class="admin-dashboard">
            <h2>店家後台接單系統</h2>
            <div id="admin-orders-list-box"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
